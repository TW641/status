    <summary style="cursor: pointer; font-weight: bold; font-size: 1.1em;">📊 TW641 Status Page - 異質多雲即時服務監測系統 (系統架構明細)</summary>
    <div style="margin-top: 15px; line-height: 1.6;">
    <p>本系統涵蓋 10 個雲端平台的 70 個節點，採用交叉監測與自我監測技術：</p>
    <ul>
    <li>1. GitHub Pages - TW641 官方主站與子專案（7 個）</li>
    <li>2. Cloudflare Pages - 備援網站（7 個）</li>
    <li>3. Cloudflare Workers - 備援網站（7 個）</li>
    <li>4. Firebase Hosting - 備援網站（7 個）</li>
    <li>5. FirebaseApp.com - 備用網域（7 個）</li>
    <li>6. GitLab Pages - 備援網站（7 個）</li>
    <li>7. Netlify - 備援網站（7 個）</li>
    <li>8. Vercel - 備援網站（7 個）</li>
    <li>9. Render - 備援網站（7 個）</li>
    <li>10. Surge - 備援網站（7 個）</li>
    </ul>
    <p>即時監測服務包括：</p>
    <ul>
    <li>TW641 GitHub Pages 官方主站 - 首頁</li>
    <li>TW641 GitHub Pages 官方主站 - daves-guitar-2026</li>
    <li>TW641 GitHub Pages 官方主站 - Padavan-CAKE</li>
    <li>TW641 GitHub Pages 官方主站 - sch_cake</li>
    <li>TW641 GitHub Pages 官方主站 - padavan-builder-workflow</li>
    <li>TW641 GitHub Pages 官方主站 - padavan-ng</li>
    <li>TW641 GitHub Pages 官方主站 - padavan-4.4</li>
    </ul>
    <p>以及 Cloudflare Pages、Cloudflare Workers、Firebase Hosting、FirebaseApp.com、GitLab Pages、Netlify、Vercel、Render、Surge 等多個備援平台的監測。</p>
    <p><strong>架構聲明：</strong><strong>即時高可用性數據一律依賴 Uptimer 邊緣運算架構作為絕對主力。</strong>備用歷史數據則採用開源方案 Upptime（無需額外伺服器），本質上僅作為備用架構的監測器。</p>
    </div>
