  baseUrl: /status
  logoUrl: /TW641.png
  name: TW641 Status
  introTitle: "TW641 Real-time Uptime Monitor | 70 Nodes Global Availability Status"
  introMessage: |
    **TW641 即時監測服務狀態頁面：** 監測官方主站與與備援網站，10 種異質多雲備援架構，共 70 個節點的可用性。

