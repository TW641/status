    - name: "description"
      content: "TW641 即時服務監測系統 (Uptime Monitor)。即時追蹤 TW641 官方主站與 10 種異質多雲備援架構（Cloudflare, Vercel, Firebase 等），共 70 個節點的全球可用性與連線狀態。"
  favicon: /TW641.png
  baseUrl: /status
  logoUrl: /TW641.png
  name: TW641 Status
  introTitle: "TW641 Real-time Uptime Monitor | 70 Nodes Global Availability Status"
  introMessage: |
    **TW641 多層次高可用性狀態中心**
    為克服單一服務的盲區，本系統採用「異質」、「多雲」、「自我監測」與「交叉監測」的雙核心架構：

    🚀 **即時精準狀態頁：高頻率邊緣運算 (絕對主力)**
    基於 Cloudflare Workers + Cloudflare Pages + Cloudflare D1 的 ZeroOps 現代化架構，實現「每分鐘準時觸發」的秒級探測！
    
    雙主力節點提供深度互動式資料分析：
    * **高頻率即時指標**：狀態頁面直觀顯示「最近 60 次檢查」的可用性，以及該區間內「最快」、「平均」與「最慢」的伺服器回應時間。
    * **24 小時延遲分析**：點選「最近 60 次檢查」條狀圖，即可展開最近一日的「平均延遲」、「P95 延遲」與「24 小時延遲狀態折線圖」。您亦可點選清單中的特定服務，獨立檢視該服務近 24 小時的動態。
    * **60 天中斷明細紀錄**：點選上方「近 60 天可用性」的單日條狀圖，將彈出當日「服務中斷明細」與總中斷時間（若系統穩定，則顯示如：`2026/7/11 總計: 0s 當天沒有紀錄到中斷。`）。
    * 👑 TW641 Status 主力頁： [https://tw641status.pages.dev/](https://tw641status.pages.dev/)
    * 👑 TW641 Uptimer 主力頁： [https://tw641uptimer.pages.dev/](https://tw641uptimer.pages.dev/)

    ---

    🛠️ **TW641 開源社群貢獻與 Pull Requests 技術索引**
    為推動開源監測架構的發展並加速搜尋引擎收錄，以下為本站維護者於核心專案提交之優化成果（點選超連結前往）：
    
    **Upptime 核心組件優化成果：**
    <ul>
    <li>🔗 <a href="https://github.com/upptime/upptime/pull/1168" target="_blank">&#91;Bug&#93;&#91;Solved by TW641 / TWShiyuLiou1997&#93; Fix Graphs CI workflow malfunction from 2026-05-21 to 2026-07-04 by TWShiyuLiou1997 · Pull Request #1168 · upptime/upptime</a><br>🔗 <a href="https://github.com/upptime/upptime/pull/1168" target="_blank">https://github.com/upptime/upptime/pull/1168</a></li>
    <li>🔗 <a href="https://github.com/upptime/uptime-monitor/pull/308" target="_blank">:bug: Set up Node 20 for generated graphs by AnandChowdhary · Pull Request #308 · upptime/uptime-monitor</a><br>🔗 <a href="https://github.com/upptime/uptime-monitor/pull/308" target="_blank">https://github.com/upptime/uptime-monitor/pull/308</a></li>
    <li>🔗 <a href="https://github.com/upptime/upptime/pull/1169" target="_blank">feat: Multi-CDN Production Optimization (jsDelivr) & CI Graphs Node.js Fix by TWShiyuLiou1997 · Pull Request #1169 · upptime/upptime</a><br>🔗 <a href="https://github.com/upptime/upptime/pull/1169" target="_blank">https://github.com/upptime/upptime/pull/1169</a></li>
    </ul>

    **Uptimer 國際化與介面體驗優化成果：**
    <ul>
    <li>🔗 <a href="https://github.com/VrianCao/Uptimer/pull/94" target="_blank">i18n(zh-TW): complete and refine Traditional Chinese (Taiwan) localization by TWShiyuLiou1997 · Pull Request #94 · VrianCao/Uptimer</a><br>🔗 <a href="https://github.com/VrianCao/Uptimer/pull/94" target="_blank">https://github.com/VrianCao/Uptimer/pull/94</a></li>
    <li>🔗 <a href="https://github.com/VrianCao/Uptimer/pull/95" target="_blank">style(i18n): refine list view toggle and precision-target group tip for zh-TW by TWShiyuLiou1997 · Pull Request #95 · VrianCao/Uptimer</a><br>🔗 <a href="https://github.com/VrianCao/Uptimer/pull/95" target="_blank">https://github.com/VrianCao/Uptimer/pull/95</a></li>
