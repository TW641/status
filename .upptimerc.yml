status-website:
  # Add your custom domain name, or remove the `cname` line if you don't have a domain
  # Uncomment the `baseUrl` line if you don't have a custom domain and add your repo name there
  # cname: demo.upptime.js.org
  robotsText: "User-agent: *\nAllow: /\n\nSitemap: https://tw641.github.io/status/sitemap.xml"
  metaTags:
    - name: "robots"
      content: "index, follow"
  favicon: /TW641.png
  baseUrl: /$REPO/
  logoUrl: /TW641.png
  name: TW641 Status
  introTitle: "**TW641 Status** is the open-source uptime monitor and status page, powered entirely by GitHub."
  introMessage: 這是 TW641 的自動化服務狀態頁面，即時監測官方主站與全球 10 大備援站點 (共 70 個節點)。Uses **real-time** data from our [GitHub repository](https://github.com/TW641/status). No server required — just GitHub Actions, Issues, and Pages. [**Get your own for free**](https://github.com/upptime/upptime)
  navbar:
    - title: Status
      href: /status/
    - title: GitHub
      href: https://github.com/$OWNER/$REPO

workflowSchedule:
  graphs: "0 0 * * *"
  responseTime: "0 23 * * *"
  staticSite: "0 1 * * *"
  summary: "0 0 * * *"
  updateTemplate: "0 0 * * *"
  updates: "0 3 * * *"
  uptime: "*/5 * * * *"

# Upptime also supports notifications, assigning issues, and more
# See https://upptime.js.org/docs/configuration
