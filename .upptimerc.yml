  introTitle: "TW641 Real-time Uptime Monitor | 70 Nodes Global Availability Status"
  introMessage: |
    **TW641 多層次高可用性狀態中心**
    為克服單一服務的盲區，本系統採用「異質」、「多雲」、「自我監測」與「交叉監測」的雙核心架構：

    🚀 **即時精準狀態頁 (Uptimer)：高頻率邊緣運算 (絕對主力)**
    基於 Cloudflare Workers 的現代化架構，實現「每分鐘準時觸發」的秒級探測！雙主力節點提供深度互動式數據解析：
    * **高頻率即時指標**：狀態頁面直觀顯示「最近 60 次檢查」的可用性，以及該區間內「最快」、「平均」與「最慢」的伺服器回應時間。
    * **24 小時延遲分析**：點選「最近 60 次檢查」條狀圖，即可展開最近一日的「平均延遲」、「P95 延遲」與「24 小時延遲狀態折線圖」。您亦可點選清單中的特定服務，獨立檢視該服務近 24 小時的動態。
    * **60 天歷史中斷明細**：點選上方「近 60 天可用性」的單日條狀圖，將彈出當日「服務中斷明細」與總中斷時間（若系統穩定，則顯示如：`2026/7/6 總計: 0s 當天沒有紀錄到中斷。`）。
    * 👑 TW641 Uptimer 主力頁： [https://tw641uptimer.pages.dev/](https://tw641uptimer.pages.dev/)
    * 👑 TW641 Status 主力頁： [https://tw641status.pages.dev/](https://tw641status.pages.dev/)

    🐢 **長期趨勢觀測頁 (Upptime)：本站目前架構 (僅供備用)**
    本頁面基於傳統 GitHub Actions 架構。由於排程佇列嚴重延遲（設定 5 分鐘，實際單日可能僅執行 10 餘次），屬於完全依賴單一生態的「不定時監測架構」。**本站目前僅適合作為「長時間的觀測參考」**。

    ☁️ **監測目標：10 種異質多雲備援架構 (70 個節點)**
    涵蓋以下官方主站與備援網站（點選展開可直接載入跨站路由實體，引導爬蟲收錄並確認全網交叉可用性）：

