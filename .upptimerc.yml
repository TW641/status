  customBodyHtml: |
    <div style="display: none; position: absolute;">
    TW641 Status Page - 即時服務監測系統
    監測以下 10 個平台的 70 個節點：
    1. GitHub Pages - TW641 官方主站與子專案（7 個）
    2. Cloudflare Pages - 備援網站（7 個）
    3. Cloudflare Workers - 備援網站（7 個）
    4. Firebase Hosting - 備援網站（7 個）
    5. FirebaseApp.com - 備用網域（7 個）
    6. GitLab Pages - 備援網站（7 個）
    7. Netlify - 備援網站（7 個）
    8. Vercel - 備援網站（7 個）
    9. Render - 備援網站（7 個）
    10. Surge - 備援網站（7 個）
    
    即時監測服務包括：
    - TW641 GitHub Pages 官方主站 - 首頁
    - TW641 GitHub Pages 官方主站 - daves-guitar-2026
    - TW641 GitHub Pages 官方主站 - Padavan-CAKE
    - TW641 GitHub Pages 官方主站 - sch_cake
    - TW641 GitHub Pages 官方主站 - padavan-builder-workflow
    - TW641 GitHub Pages 官方主站 - padavan-ng
    - TW641 GitHub Pages 官方主站 - padavan-4.4
    以及 Cloudflare Pages、Cloudflare Workers、Firebase Hosting、FirebaseApp.com、GitLab Pages、Netlify、Vercel、Render、Surge 等多個備援平台的監測。
    
    採用開源方案 Upptime，無需額外伺服器。
    </div>
  
